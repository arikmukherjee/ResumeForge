<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ResumeForge — Build Your Story</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="app-header">
  <div class="header-brand">
    <div class="brand-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="brand-name">ResumeForge</span>
  </div>

  <nav class="header-nav">
    <div class="template-switcher">
      <button class="tmpl-btn active" data-template="modern" title="Modern">
        <span class="tmpl-icon">◼</span> Modern
      </button>
      <button class="tmpl-btn" data-template="minimal" title="Minimal">
        <span class="tmpl-icon">◻</span> Minimal
      </button>
      <button class="tmpl-btn" data-template="creative" title="Creative">
        <span class="tmpl-icon">◈</span> Creative
      </button>
    </div>

    <div class="color-picker-wrap">
      <span class="color-label">Accent</span>
      <div class="color-swatches">
        <button class="swatch active" data-color="#6C63FF" style="background:#6C63FF" title="Violet"></button>
        <button class="swatch" data-color="#0EA5E9" style="background:#0EA5E9" title="Sky"></button>
        <button class="swatch" data-color="#10B981" style="background:#10B981" title="Emerald"></button>
        <button class="swatch" data-color="#F59E0B" style="background:#F59E0B" title="Amber"></button>
        <button class="swatch" data-color="#EF4444" style="background:#EF4444" title="Rose"></button>
        <button class="swatch" data-color="#EC4899" style="background:#EC4899" title="Pink"></button>
      </div>
    </div>

    <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">
      <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2"/>
        <line x1="12" y1="1" x2="12" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="12" y1="21" x2="12" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="1" y1="12" x2="3" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="21" y1="12" x2="23" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" style="display:none">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <button class="btn-download" id="downloadBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="7 10 12 15 17 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="12" y1="15" x2="12" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Export PDF
    </button>
  </nav>
</header>

<!-- ===== MAIN LAYOUT ===== -->
<main class="app-layout">

  <!-- LEFT: FORM PANEL -->
  <aside class="form-panel" id="formPanel">
    <div class="panel-header">
      <h2>Your Information</h2>
      <div class="panel-actions">
        <button class="btn-icon" id="clearAllBtn" title="Clear all data">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><polyline points="3 6 5 6 21 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M10 11v6M14 11v6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>

    <div class="form-sections">

      <!-- PERSONAL -->
      <div class="form-card" id="card-personal">
        <div class="card-header" data-section="personal">
          <div class="card-title-row">
            <div class="card-icon personal-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2"/></svg>
            </div>
            <span>Personal Details</span>
          </div>
          <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none"><polyline points="6 9 12 15 18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </div>
        <div class="card-body open">
          <div class="photo-upload-area">
            <div class="photo-preview" id="photoPreview">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2"/></svg>
            </div>
            <div class="photo-info">
              <label class="btn-upload" for="photoInput">Upload Photo</label>
              <input type="file" id="photoInput" accept="image/*" hidden/>
              <p>JPG, PNG — Max 5MB</p>
            </div>
          </div>
          <div class="form-grid two-col">
            <div class="form-group">
              <label>Full Name *</label>
              <input type="text" id="fullName" placeholder="John Anderson" data-field="fullName"/>
            </div>
            <div class="form-group">
              <label>Job Title</label>
              <input type="text" id="jobTitle" placeholder="Senior Developer" data-field="jobTitle"/>
            </div>
          </div>
          <div class="form-grid two-col">
            <div class="form-group">
              <label>Email *</label>
              <input type="email" id="email" placeholder="john@example.com" data-field="email"/>
            </div>
            <div class="form-group">
              <label>Phone</label>
              <input type="tel" id="phone" placeholder="+1 234 567 8900" data-field="phone"/>
            </div>
          </div>
          <div class="form-grid two-col">
            <div class="form-group">
              <label>Location</label>
              <input type="text" id="location" placeholder="New York, USA" data-field="location"/>
            </div>
            <div class="form-group">
              <label>Website / Portfolio</label>
              <input type="url" id="website" placeholder="https://portfolio.com" data-field="website"/>
            </div>
          </div>
          <div class="form-group">
            <label>LinkedIn</label>
            <input type="text" id="linkedin" placeholder="linkedin.com/in/johnanderson" data-field="linkedin"/>
          </div>
          <div class="form-group">
            <label>Professional Summary</label>
            <textarea id="summary" placeholder="A brief professional summary highlighting your key strengths, experience, and career goals..." rows="4" data-field="summary"></textarea>
          </div>
        </div>
      </div>

      <!-- EXPERIENCE -->
      <div class="form-card" id="card-experience">
        <div class="card-header" data-section="experience">
          <div class="card-title-row">
            <div class="card-icon experience-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><rect x="2" y="7" width="20" height="14" rx="2" stroke="currentColor" stroke-width="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" stroke="currentColor" stroke-width="2"/></svg>
            </div>
            <span>Work Experience</span>
          </div>
          <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none"><polyline points="6 9 12 15 18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </div>
        <div class="card-body open" id="experienceBody">
          <div id="experienceEntries"></div>
          <button class="btn-add-entry" id="addExperience">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            Add Experience
          </button>
        </div>
      </div>

      <!-- EDUCATION -->
      <div class="form-card" id="card-education">
        <div class="card-header" data-section="education">
          <div class="card-title-row">
            <div class="card-icon education-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M22 10v6M2 10l10-5 10 5-10 5-10-5z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 12v5c3 3 9 3 12 0v-5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </div>
            <span>Education</span>
          </div>
          <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none"><polyline points="6 9 12 15 18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </div>
        <div class="card-body open" id="educationBody">
          <div id="educationEntries"></div>
          <button class="btn-add-entry" id="addEducation">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            Add Education
          </button>
        </div>
      </div>

      <!-- SKILLS -->
      <div class="form-card" id="card-skills">
        <div class="card-header" data-section="skills">
          <div class="card-title-row">
            <div class="card-icon skills-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <span>Skills</span>
          </div>
          <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none"><polyline points="6 9 12 15 18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </div>
        <div class="card-body open">
          <div class="form-group">
            <label>Skills <span class="label-hint">(comma-separated)</span></label>
            <input type="text" id="skillsInput" placeholder="JavaScript, React, Node.js, Python, Figma..." data-field="skills"/>
          </div>
          <div id="skillTags" class="skill-tags-preview"></div>
          <div class="form-group">
            <label>Languages</label>
            <input type="text" id="languagesInput" placeholder="English (Native), Spanish (B2)..." data-field="languages"/>
          </div>
        </div>
      </div>

      <!-- PROJECTS -->
      <div class="form-card" id="card-projects">
        <div class="card-header" data-section="projects">
          <div class="card-title-row">
            <div class="card-icon projects-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <span>Projects</span>
          </div>
          <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none"><polyline points="6 9 12 15 18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </div>
        <div class="card-body" id="projectsBody">
          <div id="projectEntries"></div>
          <button class="btn-add-entry" id="addProject">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            Add Project
          </button>
        </div>
      </div>

    </div><!-- /form-sections -->
  </aside>

  <!-- RIGHT: PREVIEW PANEL -->
  <section class="preview-panel" id="previewPanel">
    <div class="preview-toolbar">
      <span class="preview-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>
        Live Preview
      </span>
      <div class="zoom-controls">
        <button class="zoom-btn" id="zoomOut">−</button>
        <span id="zoomLevel">100%</span>
        <button class="zoom-btn" id="zoomIn">+</button>
      </div>
    </div>
    <div class="preview-scroll-area">
      <div class="resume-wrapper" id="resumeWrapper">
        <div id="resumePreview" class="resume-doc template-modern"></div>
      </div>
    </div>
  </section>

</main>

<!-- MOBILE TAB BAR -->
<div class="mobile-tabs">
  <button class="mobile-tab active" data-panel="form">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    Edit
  </button>
  <button class="mobile-tab" data-panel="preview">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>
    Preview
  </button>
  <button class="mobile-tab" id="mobileDownload">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><polyline points="7 10 12 15 17 10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="15" x2="12" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    Export
  </button>
</div>

<!-- TOAST NOTIFICATION -->
<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
